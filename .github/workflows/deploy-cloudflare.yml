name: Build and deploy to Cloudflare Workers

on:
  push:
    branches: ["master"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install and build frontend
        run: |
          npm ci --prefix frontend
          npm run build --prefix frontend

      - name: Install wrangler
        run: npm install -g wrangler@2

      - name: Publish to Cloudflare Workers (site)
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          # Ensure account id is provided by secret or wrangler.toml
          wrangler publish --site frontend/dist --account-id $CF_ACCOUNT_ID --compatibility-date 2026-03-12
