{% extends "profile/layout.html" %}

{% block profile_content %}
<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 max-w-lg">

    <div class="border-l-4 border-orange-500 pl-4 mb-8">
        <h2 class="text-xl font-bold text-gray-800">Đổi Mật Khẩu</h2>
        <p class="text-sm text-gray-400 mt-1">Mật khẩu mới phải có ít nhất 6 ký tự.</p>
    </div>

    <form method="POST" action="{{ url_for('profile.change_password') }}" id="pw-form" class="space-y-5">

        <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">Mật Khẩu Hiện Tại</label>
            <div class="relative">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none">
                    <i class="fas fa-lock"></i>
                </span>
                <input type="password" name="old_password" required autocomplete="off" class="w-full pl-11 pr-10 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm
                              focus:ring-2 focus:ring-orange-400 outline-none transition" placeholder="••••••••">
                <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 toggle-pwd focus:outline-none">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
        </div>

        <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">Mật Khẩu Mới</label>
            <div class="relative">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none">
                    <i class="fas fa-key"></i>
                </span>
                <input type="password" name="new_password" id="new_password" required autocomplete="off" class="w-full pl-11 pr-10 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm
                              focus:ring-2 focus:ring-orange-400 outline-none transition" placeholder="••••••••">
                <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 toggle-pwd focus:outline-none">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
        </div>

        <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">Xác Nhận Mật Khẩu Mới</label>
            <div class="relative">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none">
                    <i class="fas fa-check-circle"></i>
                </span>
                <input type="password" name="confirm_password" id="confirm_password" required autocomplete="off" class="w-full pl-11 pr-10 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm
                              focus:ring-2 focus:ring-orange-400 outline-none transition" placeholder="••••••••">
                <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 toggle-pwd focus:outline-none">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
            <p id="pw-match-hint" class="text-xs mt-1 hidden"></p>
        </div>

        <div class="flex flex-col gap-3 pt-2">
            <button type="submit"
                class="w-full py-3 rounded-xl text-white font-bold text-sm transition shadow-md hover:shadow-lg hover:-translate-y-0.5"
                style="background:#F27123">
                Xác Nhận Đổi Mật Khẩu
            </button>
            <a href="{{ url_for('profile.profile') }}"
                class="block w-full text-center py-3 bg-gray-100 text-gray-500 rounded-xl font-bold text-sm hover:bg-gray-200 transition">
                Quay Lại
            </a>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
    const np = document.getElementById('new_password');
    const cp = document.getElementById('confirm_password');
    const hint = document.getElementById('pw-match-hint');

    function checkMatch() {
        if (!cp.value) { hint.classList.add('hidden'); return; }
        hint.classList.remove('hidden');
        if (np.value === cp.value) {
            hint.textContent = '✓ Mật khẩu khớp';
            hint.className = 'text-xs mt-1 text-green-500';
        } else {
            hint.textContent = '✗ Mật khẩu không khớp';
            hint.className = 'text-xs mt-1 text-red-500';
        }
    }
    np.addEventListener('input', checkMatch);
    cp.addEventListener('input', checkMatch);

    // Toggle Password Visibility
    document.querySelectorAll('.toggle-pwd').forEach(btn => {
        btn.addEventListener('click', function() {
            const input = this.closest('.relative').querySelector('input');
            const icon = this.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });
    });
</script>
{% endblock %}
