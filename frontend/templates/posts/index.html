{% extends "base.html" %}

{% block content %}
<!-- Load Search CSS -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/search.css') }}">

<!-- Search & Filter Component -->
{% include 'search/search_filter.html' %}

<!-- Items Grid (rendered by search.js via AJAX) -->
<div id="items-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
    <!-- Skeleton placeholders shown initially, replaced by JS -->
    {% for i in range(6) %}
    {% include 'search/skeleton_card.html' %}
    {% endfor %}
</div>

<!-- Pagination -->
<div id="pagination-bar" class="flex justify-center items-center gap-2 mt-8"></div>

<!-- Include Detail Modal -->
{% include 'posts/detail_modal.html' %}
{% endblock %}

{% block scripts %}
<!-- Search & Filter JS -->
<script src="{{ url_for('static', filename='js/search.js') }}"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Open detail modal for new post (from redirect after creating)
        const urlParams = new URLSearchParams(window.location.search);
        const newPostId = urlParams.get('new_post_id');
        if (newPostId) {
            openDetailModal(newPostId);
            const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
            window.history.pushState({ path: newUrl }, '', newUrl);
        }
    });
</script>
{% endblock %}
