{% extends "base.html" %}

{% block content %}
<!-- Include EmailJS SDK -->
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script type="text/javascript">
   (function(){
      // [BƯỚC 1] TODO: THAY PUBLIC_KEY CỦA EMAILJS VÀO ĐÂY
      emailjs.init("FiWoCZgxcRcbBod10");
   })();
</script>

<div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-lg mt-10">
    <h2 class="text-2xl font-bold text-center mb-6 text-gray-800">Quên Mật Khẩu</h2>
    <p class="text-gray-600 text-sm mb-6 text-center">Nhập email của bạn, hệ thống sẽ gửi một link bí mật để tạo lại mật khẩu mới.</p>
    
    <form id="forgot-password-form">
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2">Địa chỉ Email</label>
            <input type="email" id="email" required placeholder="nhap.email.cua.ban@gmail.com"
                class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-orange-500">
        </div>
        
        <button type="submit" id="submit-btn"
            class="w-full bg-orange-600 text-white font-bold py-2 px-4 rounded-md hover:bg-orange-700 transition duration-300 flex justify-center items-center">
            <span>Gửi Link Khôi Phục <i class="fas fa-paper-plane ml-1"></i></span>
        </button>
    </form>
    
    <div id="status-message" class="hidden mt-4 p-3 rounded text-sm text-center font-medium"></div>

    <p class="mt-4 text-center text-sm text-gray-600">
        Nhớ mật khẩu rồi? <a href="{{ url_for('auth_login.login') }}"
            class="text-orange-600 hover:underline font-bold">Quay lại đăng nhập</a>
    </p>
</div>

<script>
document.getElementById('forgot-password-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const btn = document.getElementById('submit-btn');
    const statusMsg = document.getElementById('status-message');
    
    // Hiển thị trạng thái đang loads
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Đang xử lý...';
    btn.classList.add('opacity-75');
    statusMsg.classList.add('hidden');
    
    try {
        // [QUAN TRỌNG] 1. Gọi Backend để sinh ra Token ResetLink an toàn
        const response = await fetch("{{ url_for('auth_password_reset.api_forgot_password') }}", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email: email })
        });
        
        const data = await response.json();
        
        if (data.success) {
            // [QUAN TRỌNG] 2. Có được Link, gọi EmailJS để phát mail cho User
            const templateParams = {
                to_email: email,             // Biến gửi vào {{to_email}} trong Template EmailJS
                to_name: data.user_name,     // Biến gửi vào {{to_name}}
                reset_link: data.reset_link  // Biến gửi vào {{reset_link}} (Link khôi phục)
            };
            
            // [BƯỚC 2] TODO: THAY SERVICE_ID VÀ TEMPLATE_ID CỦA BẠN VÀO ĐÂY
            await emailjs.send('service_263jx3i', 'template_1gblxih', templateParams);
            
            // Xử lý báo Cáo Thành Công
            statusMsg.innerHTML = '<i class="fas fa-check-circle mr-1"></i> Thành công! Vui lòng kiểm tra hộp thư email (và mục Spam) để nhận link khôi phục ngay lập tức.';
            statusMsg.className = "mt-4 p-3 rounded text-sm text-center font-medium bg-green-100 text-green-700 block";
            
            // Xoá nội dung ô input
            document.getElementById('email').value = '';
        } else {
            // Nếu email cung cấp không có trong hệ thống Database
            statusMsg.innerHTML = '<i class="fas fa-exclamation-circle mr-1"></i> ' + (data.message || "Lỗi xử lý, vui lòng thử lại sau.");
            statusMsg.className = "mt-4 p-3 rounded text-sm text-center font-medium bg-red-100 text-red-700 block";
        }
    } catch (error) {
        console.error("Lỗi gửi EmailJS:", error);
        statusMsg.innerHTML = '<i class="fas fa-times-circle mr-1"></i> Lỗi máy chủ hoặc API Keys EmailJS chưa đúng. Mở Console F12 để xem.';
        statusMsg.className = "mt-4 p-3 rounded text-sm text-center font-medium bg-red-100 text-red-700 block";
    } finally {
        // Trả lại trạng thái cho Nút Submit
        btn.disabled = false;
        btn.innerHTML = '<span>Gửi Link Khôi Phục <i class="fas fa-paper-plane ml-1"></i></span>';
        btn.classList.remove('opacity-75');
    }
});
</script>
{% endblock %}
