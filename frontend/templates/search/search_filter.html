<!-- ============================================================
     Search Bar + Filter Panel – includable component
     ============================================================ -->

<!-- Search Bar -->
<div class="text-center mb-6">
    <h1 class="text-4xl font-extrabold text-slate-800 dark:text-white mb-4 transition-colors">
        Tìm Đồ Thất Lạc <span class="text-orange-600">FPTU</span>
    </h1>
    <p class="text-slate-500 dark:text-gray-400 mb-6 transition-colors">Kết nối cộng đồng, tìm lại đồ đã mất nhanh chóng.</p>

    <div class="max-w-2xl mx-auto relative" id="search-container">
        <div
            class="search-wrapper flex shadow-sm rounded-xl overflow-hidden border border-slate-200 transition-all bg-white dark:bg-gray-800 dark:border-gray-700">
            <span class="flex items-center pl-4 text-slate-400"><i class="fas fa-search"></i></span>
            <input type="text" id="search-input" placeholder="Tìm kiếm (Chìa khóa, ví, thẻ xe...)" autocomplete="off"
                class="flex-grow px-4 py-3.5 border-none focus:outline-none text-slate-700 dark:text-gray-200 bg-transparent">
            <button type="button" id="clear-search-btn"
                class="hidden items-center px-3 text-gray-400 hover:text-gray-600 transition" title="Xóa tìm kiếm">
                <i class="fas fa-times"></i>
            </button>
            <button type="button" id="search-submit-btn"
                class="bg-orange-600 text-white px-6 font-bold hover:bg-orange-700 transition text-sm">
                Tìm kiếm
            </button>
        </div>

        <!-- Autocomplete dropdown -->
        <div class="autocomplete-dropdown" id="autocomplete-dropdown"></div>
    </div>
</div>

<!-- Filter Toggle Button -->
<div class="flex items-center justify-between max-w-6xl mx-auto mb-4">
    <button type="button" id="toggle-filter-btn" class="inline-flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium
                   bg-white dark:bg-gray-800 border border-slate-200 dark:border-gray-700 text-slate-600 dark:text-gray-300 hover:border-orange-300
                   hover:text-orange-600 transition shadow-sm">
        <i class="fas fa-sliders-h"></i> Bộ lọc
        <span id="active-filter-count" class="hidden bg-orange-600 text-white rounded-full w-5 h-5 text-xs
                     flex items-center justify-center">0</span>
    </button>

    <div class="flex items-center gap-3">
        <!-- Result counter -->
        <span id="result-counter" class="text-sm font-medium text-slate-500 dark:text-gray-400"></span>

        <!-- Sort dropdown -->
        <select id="sort-select" class="text-sm border border-slate-200 dark:border-gray-700 rounded-lg px-3 py-2 bg-white dark:bg-gray-800
                       text-slate-600 dark:text-gray-200 focus:outline-none focus:border-orange-400 cursor-pointer shadow-sm">
            <option value="newest">Mới nhất</option>
            <option value="oldest">Cũ nhất</option>

        </select>
    </div>
</div>

<div id="filter-panel" class="hidden max-w-6xl mx-auto mb-6">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-slate-100 dark:border-gray-700 p-5 transition-colors">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">

<!-- Type filter removed as items are now separated natively on the UI -->

            <!-- Status filter -->
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">Trạng thái</label>
                <div class="flex gap-2">
                    <button type="button" data-filter="status" data-value=""
                        class="filter-chip active-generic status-chip">Đang tìm</button>
                    <button type="button" data-filter="status" data-value="Closed"
                        class="filter-chip inactive status-chip">Đã hoàn trả</button>
                    <button type="button" data-filter="status" data-value="all"
                        class="filter-chip inactive status-chip">Tất cả</button>
                </div>
            </div>

            <!-- Location filter (hierarchical) -->
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">Khu vực</label>
                <select id="filter-location" class="w-full text-sm border border-gray-200 dark:border-gray-600 rounded-lg px-3 py-2 bg-white dark:bg-gray-700 dark:text-gray-200
                               focus:outline-none focus:border-orange-400">
                    <option value="">Tất cả khu vực</option>
                </select>
                <select id="filter-sub-location" class="hidden w-full text-sm border border-gray-200 dark:border-gray-600 rounded-lg px-3 py-2 bg-white dark:bg-gray-700 dark:text-gray-200
                               focus:outline-none focus:border-orange-400 mt-2">
                    <option value="">Tất cả các khu vực</option>
                </select>
            </div>

            <!-- Category filter -->
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">Danh mục</label>
                <select id="filter-category" class="w-full text-sm border border-gray-200 dark:border-gray-600 rounded-lg px-3 py-2 bg-white dark:bg-gray-700 dark:text-gray-200
                               focus:outline-none focus:border-orange-400">
                    <option value="">Tất cả danh mục</option>
                </select>
            </div>
        </div>

        <!-- Active filter tags -->
        <div id="active-filters" class="mt-4 flex flex-wrap gap-2 hidden"></div>
    </div>
</div>
