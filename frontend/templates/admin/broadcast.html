{% extends "admin/layout.html" %}

{% block admin_content %}
<div class="max-w-2xl mx-auto space-y-8 animate-fade-in">
    <div>
        <h1 class="text-3xl font-extrabold text-gray-800 flex items-center gap-4">
            <div class="bg-orange-100 text-orange-600 p-3 rounded-2xl"><i class="fas fa-bullhorn text-2xl"></i></div>
            System Broadcast
        </h1>
        <p class="text-gray-500 mt-4 text-sm leading-relaxed">Send real-time announcements to every active user in the system.</p>
    </div>

    <div class="bg-white rounded-3xl border border-gray-200 shadow-xl overflow-hidden shadow-orange-50/50">
        <form action="{{ url_for('admin_dashboard.admin_broadcast') }}" method="POST" class="p-8 space-y-8">
            <div class="space-y-4">
                <label for="message" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest px-1">Broadcast Message</label>
                <textarea name="message" id="message" rows="5" required placeholder="Type your announcement here..." class="w-full bg-gray-50 border-2 border-transparent rounded-2xl p-4 text-sm focus:ring-4 focus:ring-orange-100 focus:border-orange-500 focus:bg-white transition outline-none resize-none placeholder-gray-300"></textarea>
            </div>
            <button type="submit" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-extrabold py-4 rounded-2xl shadow-lg transition transform active:scale-95 flex items-center justify-center gap-3">
                <i class="fas fa-paper-plane"></i> Send Broadcast Announcement
            </button>
        </form>
    </div>
</div>
{% endblock %}
